<section class="services" id="services">
  <div class="container">
    <div class="section-label">Services</div>
    <h2>What I Offer</h2>
    <div class="services-grid">
      {{ range hugo.Data.services }}
      <article class="service-card reveal">
        <h3>{{ .title }}</h3>
        <p class="service-tagline">{{ .tagline }}</p>
        <p>{{ .description }}</p>
        <ul>
          {{ range .bullets }}
          <li>{{ . }}</li>
          {{ end }}
        </ul>
      </article>
      {{ end }}
    </div>
    {{ with .Params.services_pricing }}
    <p class="services-pricing">{{ . }}</p>
    {{ end }}
  </div>
</section>
