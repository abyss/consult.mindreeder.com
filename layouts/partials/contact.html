<section class="contact section-alt" id="contact">
  <div class="container contact-inner">
    <div class="section-label">Contact</div>
    <h2>{{ .Params.contact_heading }}</h2>
    <p class="contact-body">{{ .Params.contact_body }}</p>

    <div class="contact-details">
      <div class="contact-detail">
        <p class="contact-detail-label">What to expect</p>
        <p>{{ .Params.contact_expect }}</p>
      </div>
      <div class="contact-detail">
        <p class="contact-detail-label">What to include</p>
        <ul>
          {{ range .Params.contact_include }}
          <li>{{ . }}</li>
          {{ end }}
        </ul>
      </div>
    </div>

    <form class="contact-form" action="https://formspree.io/f/{{ .Site.Params.formspree_id }}" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required rows="5" placeholder="{{ .Params.contact_body }}"></textarea>
      </div>
      <button type="submit" class="btn-primary">Send Message</button>
    </form>

    <p class="contact-response">{{ .Params.contact_response }}</p>
  </div>
</section>
