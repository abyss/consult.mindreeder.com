<section class="about section-alt" id="about">
  <div class="container about-inner">
    <div class="section-label">{{ .Params.about_heading }}</div>
    <h2>{{ .Params.about_subheading }}</h2>
    <div class="about-body">
      {{ .Params.about_body | markdownify }}
    </div>
    <div class="about-stats">
      {{ range .Params.about_stats }}
      <div class="about-stat">
        <span class="about-stat-value">{{ .value }}</span>
        <span class="about-stat-label">{{ .label }}</span>
      </div>
      {{ end }}
    </div>
  </div>
</section>
