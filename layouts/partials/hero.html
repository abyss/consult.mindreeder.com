<section class="hero" id="hero">
  <div aria-hidden="true" class="hero-watermark">♣</div>
  <div class="hero-inner container">
    <p class="hero-eyebrow anim-fade-up" style="--anim-delay: 0ms">Mindreeder Consulting</p>
    <h1 class="anim-fade-up" style="--anim-delay: 100ms">{{ .Params.hero_headline }}</h1>
    <p class="hero-sub anim-fade-up" style="--anim-delay: 220ms">{{ .Params.hero_subheading }}</p>
    <a href="#contact" class="btn-primary anim-fade-up" style="--anim-delay: 340ms">{{ .Params.hero_cta }}</a>
  </div>
</section>
